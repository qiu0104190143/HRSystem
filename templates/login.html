<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - HR招聘管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #1e2745 40%, #2d3560 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            width: 420px; max-width: 95%;
        }
        .login-header {
            text-align: center; margin-bottom: 32px;
        }
        .login-header .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #4f6ef7 0%, #7c8cf8 100%);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff;
            margin-bottom: 16px;
        }
        .login-header h3 { color: #fff; font-weight: 700; font-size: 22px; }
        .login-header p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
        .login-card {
            background: #fff; border-radius: 16px; padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-card .form-label { font-size: 13px; font-weight: 600; color: #6b7280; }
        .login-card .form-control {
            padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 10px;
            font-size: 15px; transition: all 0.2s;
        }
        .login-card .form-control:focus {
            border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
        }
        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #4f6ef7 0%, #3d56d4 100%);
            color: #fff; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(79,110,247,0.4);
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,110,247,0.5); }
        .login-error {
            background: #fef2f2; color: #991b1b; padding: 12px 16px;
            border-radius: 10px; font-size: 14px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .login-footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.35); font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon"><i class="bi bi-building"></i></div>
            <h3>HR招聘管理系统</h3>
            <p>请输入账号密码登录</p>
        </div>
        <div class="login-card">
            {% if error %}
            <div class="login-error">
                <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
            </div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">账号</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1px solid #e5e7eb;border-right:none;background:#fff;">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" name="username" class="form-control" placeholder="请输入账号"
                               style="border-radius:0 10px 10px 0;" value="{{ request.form.username or '' }}" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1px solid #e5e7eb;border-right:none;background:#fff;">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码"
                               style="border-radius:0 10px 10px 0;" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>登 录
                </button>
            </form>
        </div>
        <div class="login-footer">默认账号：admin / admin123</div>
    </div>
</body>
</html>
